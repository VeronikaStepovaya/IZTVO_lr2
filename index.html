<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Піраміди Гізи (VR)</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>
<body>
    <a-scene background="color: #87CEEB">
        <!-- Попереднє завантаження текстури цегли -->
        <a-assets>
            <img id="brick-texture" src="https://raw.githubusercontent.com/aframevr/sample-assets/master/assets/images/bricks/brick_floor_01.jpg">
        </a-assets>

        <!-- Земля (піщана) -->
        <a-plane position="0 0 -20" rotation="-90 0 0" width="400" height="400" color="#D2B48C"></a-plane>

        <!-- *** ПІРАМІДА ХЕОПСА (1) *** -->
        <!-- Висота 145, сторона 230 -->
        <a-cone position="0 0 -20" radius-bottom="115" height="145" segments-radial="4" material="src: #brick-texture">
            <!-- Золота верхівка (зсунута вгору на висоту піраміди) -->
            <a-cone position="0 72.5 0" radius-bottom="5" radius-top="0" height="15" color="gold" material="shader: flat"></a-cone>
        </a-cone>

        <!-- *** ПІРАМІДА ХЕФРЕНА (2) *** -->
        <!-- Висота 135, сторона 210 -->
        <!-- Розміщуємо зліва-ззаду -->
        <a-cone position="-140 0 -120" radius-bottom="105" height="135" segments-radial="4" material="src: #brick-texture">
            <a-cone position="0 67.5 0" radius-bottom="4" radius-top="0" height="10" color="gold" material="shader: flat"></a-cone>
        </a-cone>

        <!-- *** ПІРАМІДА МІКЕРІНА (3) *** -->
        <!-- Висота 65, сторона 100 -->
        <!-- Розміщуємо справа-ззаду -->
        <a-cone position="140 0 -100" radius-bottom="50" height="65" segments-radial="4" material="src: #brick-texture">
            <a-cone position="0 32.5 0" radius-bottom="3" radius-top="0" height="8" color="gold" material="shader: flat"></a-cone>
        </a-cone>

        <!-- Камера з анімацією "наїзду" на центральну піраміду -->
        <a-camera position="0 20 100">
            <a-animation attribute="position" 
                         from="0 20 100" 
                         to="0 15 10" 
                         dur="10000" 
                         easing="ease-in-out" 
                         loop="true" 
                         direction="alternate">
            </a-animation>
        </a-camera>
    </a-scene>
</body>
</html>
